<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0, width=device-width">
    <title>Book Store API</title>
    <link href="https://fonts.googleapis.com/css?family=Lato%7CRaleway" rel="stylesheet">
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script defer src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script defer src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="module" src="js/main.js"></script>
</head>

<body>
<div class="grid-con" id="app">
  <div class="col-span-full m-col-start-1 m-col-end-13">
    <h2>My Favorite Books</h2>
    <p>Enjoy your journey through the literary landscape of my fav reads</p>
    <p>Click on a book title to find out more about it</p>
    <div v-if="loadingBooks">
      <img class="loader" src="images/loader.svg" alt="Loading Books">
    </div>
    <ul id="book-list" v-else>
      <li v-for="book in booksData" :key="book.id">
        <h3>
          Title:
          <button @click="getBook(book.id)">
            {{book.title}}
          </button>
        </h3>
      </li>
    </ul>
  </div>
  <div class="col-span-full m-col-start-1 m-col-end-13" ref="bookInfoCon">
    <div v-if="loadingBookDetails">
      <img class="loader" src="images/loader.svg" alt="Loading Book Details">
    </div>
    <div v-else-if="error">
      {{error}}
    </div>
    <div v-else-if="selectedBooks" id="info-box">
      <img :src="selectedBooks.image_url" :alt="selectedBooks.author">
      <p>
      <span class="title">Author:</span>
      {{selectedBooks.author}}
      </p>
      <p>
      <span class="title">Published Year:</span>
      {{selectedBooks.published}}
      </p>
      <p>
      <span class="title">Description:</span>
      {{selectedBooks.description}}
      </p>
    </div>
  </div>
  <footer class="col-span-full"></footer>
</div>
</body>
</html>
